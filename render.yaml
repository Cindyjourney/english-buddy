services:
  - type: web
    name: english-buddy
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: XFYUN_APPID
        sync: false
      - key: XFYUN_API_KEY
        sync: false
      - key: XFYUN_API_SECRET
        sync: false

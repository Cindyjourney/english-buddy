<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Buddy 🌟</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/grammar.css" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <div class="buddy-avatar" id="buddy-avatar">🌟</div>
      <div class="header-title">
        <h1>English Buddy</h1>
        <p id="buddy-subtitle">Your Sunny English Friend!</p>
      </div>
    </div>
    <div class="header-right">
      <div id="header-badges" class="header-badges"></div>
      <button id="reset-btn" class="reset-btn" title="重新开始">🔄</button>
    </div>
  </header>

  <!-- Mode Toggle + Learning Module Navigation -->
  <div class="mode-toggle-wrap">
    <button class="mode-tab mode-tab-kids active" id="tab-kids" onclick="switchMode('kids')">🧒 Kids Mode</button>
    <button class="mode-tab mode-tab-toefl" id="tab-toefl" onclick="switchMode('toefl')">🎓 TOEFL Mode</button>
  </div>

  <!-- Kids Mode Nav -->
  <div class="learn-nav" id="nav-kids">
    <a href="grammar.html" class="learn-btn learn-btn-grammar">
      <span class="learn-btn-icon">📚</span>
      <span class="learn-btn-text">语法学习</span>
    </a>
    <a href="writing.html" class="learn-btn learn-btn-writing">
      <span class="learn-btn-icon">✍️</span>
      <span class="learn-btn-text">英文写作</span>
    </a>
  </div>

  <!-- TOEFL Mode Nav -->
  <div class="learn-nav" id="nav-toefl" style="display:none">
    <a href="toefl-grammar.html" class="learn-btn" style="background:linear-gradient(135deg,#1e3a5f,#2d5986)">
      <span class="learn-btn-icon">🎓</span>
      <span class="learn-btn-text">Academic Grammar</span>
    </a>
    <a href="toefl-writing.html" class="learn-btn" style="background:linear-gradient(135deg,#064e3b,#065f46)">
      <span class="learn-btn-icon">📝</span>
      <span class="learn-btn-text">TOEFL Writing</span>
    </a>
    <a class="learn-btn" style="background:linear-gradient(135deg,#312e81,#3730a3);opacity:0.6;cursor:not-allowed" title="Coming soon">
      <span class="learn-btn-icon">📖</span>
      <span class="learn-btn-text">Reading <small style="display:block;font-size:0.7em;opacity:0.8">Coming soon</small></span>
    </a>
    <a class="learn-btn" style="background:linear-gradient(135deg,#7c2d12,#9a3412);opacity:0.6;cursor:not-allowed" title="Coming soon">
      <span class="learn-btn-icon">🎧</span>
      <span class="learn-btn-text">Listening <small style="display:block;font-size:0.7em;opacity:0.8">Coming soon</small></span>
    </a>
  </div>

  <style>
    .mode-toggle-wrap {
      display: flex;
      gap: 8px;
      padding: 10px 16px 0;
      justify-content: center;
    }
    .mode-tab {
      flex: 1;
      max-width: 160px;
      padding: 8px 0;
      border-radius: 20px;
      border: 2px solid transparent;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.08);
      color: #9ca3af;
    }
    .mode-tab.active {
      color: #fff;
    }
    .mode-tab-kids.active { background: linear-gradient(135deg,#f59e0b,#d97706); border-color: #fbbf24; }
    .mode-tab-toefl.active { background: linear-gradient(135deg,#1e3a5f,#2d5986); border-color: #3b82f6; }
  </style>

  <script>
    (function() {
      const saved = localStorage.getItem('eb_mode') || 'kids';
      if (saved === 'toefl') {
        document.getElementById('nav-kids').style.display = 'none';
        document.getElementById('nav-toefl').style.display = '';
        document.getElementById('tab-kids').classList.remove('active');
        document.getElementById('tab-toefl').classList.add('active');
      }
    })();
    function switchMode(mode) {
      localStorage.setItem('eb_mode', mode);
      document.getElementById('nav-kids').style.display = mode === 'kids' ? '' : 'none';
      document.getElementById('nav-toefl').style.display = mode === 'toefl' ? '' : 'none';
      document.getElementById('tab-kids').classList.toggle('active', mode === 'kids');
      document.getElementById('tab-toefl').classList.toggle('active', mode === 'toefl');
    }
  </script>

  <!-- Voice Style Selector -->
  <div class="voice-selector">
    <span class="voice-selector-label">声音</span>
    <button class="voice-opt" data-style="sunny_girl">🌟 阳光女声</button>
    <button class="voice-opt" data-style="girl">🌸 温柔女声</button>
    <button class="voice-opt" data-style="sunny_boy">⚡ 阳光男声</button>
    <button class="voice-opt" data-style="boy">🎯 温和男声</button>
  </div>

  <!-- Interests Panel -->
  <div id="interests-panel" class="interests-panel" style="display:none">
    <span class="interests-label">🌍 兴趣星球</span>
    <div id="interest-tags" class="interest-tags"></div>
  </div>

  <!-- Chat Messages -->
  <main id="messages" class="messages"></main>

  <!-- Footer Input -->
  <footer class="app-footer">
    <button id="voice-btn" class="voice-btn" title="按住说英语">🎤</button>
    <input
      id="text-input"
      class="text-input"
      type="text"
      placeholder="Type in English... 🌟"
      autocomplete="off"
    />
    <button id="send-btn" class="send-btn">➤</button>
  </footer>

  <!-- Word Popup -->
  <div id="word-popup" class="word-popup">
    <div class="word-popup-inner">
      <div class="word-icon">📖</div>
      <div class="word-text"></div>
      <div class="word-label">New Word!</div>
    </div>
  </div>

  <!-- Badge Popup -->
  <div id="badge-popup" class="badge-popup">
    <div class="badge-popup-inner">
      <div class="badge-emoji"></div>
      <div class="badge-label"></div>
      <div class="badge-sublabel">You earned a badge! 🎉</div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/interests.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
